name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MOCK_MODE: "true"
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build FAISS index (cache for test suite)
        run: python -c "from pipeline.ingestion import build_faiss_index; build_faiss_index()"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=pipeline \
            --cov=agents \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95 \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --select=E,F,W --ignore=E501 || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finance-llmops-platform:ci .

      - name: Verify image exists
        run: docker image inspect finance-llmops-platform:ci
