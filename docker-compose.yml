version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - MOCK_MODE=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data      # persist FAISS index and monitoring logs
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root /mlartifacts
        --host 0.0.0.0
        --port 5000
    volumes:
      - mlflow-data:/mlartifacts
      - mlflow-db:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mlflow-data:
  mlflow-db:
